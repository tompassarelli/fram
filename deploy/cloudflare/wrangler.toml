# wrangler.toml — deploys worker-example.js against your shim.
#   wrangler secret put SHIM_TOKEN     (same value the shim was started with)
#   wrangler deploy
name = "fram-bench"
main = "worker-example.js"
compatibility_date = "2026-01-01"

[vars]
# Public URL of the shim (deploy/cloudflare/shim.clj) — https behind your
# reverse proxy/tunnel, or http on a Cloudflare-supported port (e.g. :8080)
# for a quick benchmark. NEVER the coordinator's raw TCP port.
SHIM_URL = "https://fram-shim.example.com"
